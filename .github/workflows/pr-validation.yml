name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR Title
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          validate-pr-title: "true"
